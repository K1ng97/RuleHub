name: Sync Rules from Config

# 每小时运行一次 (UTC时间)。请根据你的需求调整 cron 表达式。
# '0 * * * *' 表示在每个小时的第 0 分钟执行。
# 也可以添加 workflow_dispatch 允许手动触发，方便测试。
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync_and_create_pr:
    runs-on: ubuntu-latest # 在最新的 Ubuntu 虚拟机上运行

    # 定义一个输出变量，用于存储脚本创建的分支名
    outputs:
      new_branch_name: ${{ steps.run_script.outputs.new_branch_name }}

    steps:
    - name: Checkout your repository # 步骤1: 拉取你的规则仓库代码
      uses: actions/checkout@v4
      # Fetch all history so the script can check status and commit properly
      with:
        fetch-depth: 0 # Fetch all history for accurate status checks and branching

    - name: Set up Git identity # 步骤2: 配置 Git 用户信息，用于提交
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Set up Python # 步骤3: 设置 Python 环境来运行同步脚本
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # 使用最新的 Python 3 版本

    - name: Install PyYAML # 步骤4: 安装 Python 脚本所需的 PyYAML 库
      run: pip install PyYAML

    - name: Run Rule Sync Script # 步骤5: 执行主要的 Python 同步脚本
      id: run_script # 给这个步骤一个ID，方便后续引用其输出
      run: python scripts/sync_rules.py
      shell: bash # 指定使用 bash shell 运行命令，以便正确处理输出变量

    # 步骤6: 创建 Pull Request
    # 只有当上一步脚本有输出 (即脚本检测到变化并创建了新分支) 时才执行
    - name: Create Pull Request
      # 检查上一步是否成功运行 (success()) 并且是否有新的分支名称输出
      # 使用 if 条件来判断脚本是否检测到变化并创建了分支
      # 脚本通过写入 $GITHUB_OUTPUT 来设置输出变量 new_branch_name
      if: success() && steps.run_script.outputs.new_branch_name != ''
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # 使用 GitHub Action 默认提供的 Token
        title: ${{ PR_TITLE }} # PR 标题
        body: | # PR 描述
          This PR was automatically generated by GitHub Actions to sync rule updates from configured sources.

          Please review the changes and merge if approved.
        # 从脚本输出的环境变量中获取分支名
        branch: ${{ steps.run_script.outputs.new_branch_name }}
        base: main # 合并到 main 分支
        delete-branch: true # PR 合并后自动删除该分支