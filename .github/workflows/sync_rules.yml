name: Sync Rules from Config

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync_and_create_pr:
    runs-on: ubuntu-latest

    # 定义 job 的环境变量
    env:
      PR_TITLE: "Automated Rule Sync Update" # 在这里定义 PR 标题

    # 定义一个输出变量，用于存储脚本创建的分支名 (如果需要给后续 job 使用的话，当前这个workflow只有一个job，也可以不定义job级别的outputs)
    outputs:
      new_branch_name: ${{ steps.run_script.outputs.new_branch_name }}


    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Git identity
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install PyYAML
      run: pip install PyYAML

    - name: Run Rule Sync Script
      id: run_script
      run: python scripts/sync_rules.py
      shell: bash # 指定使用 bash shell 运行命令，以便正确处理输出变量

    # Create Pull Request Step
    - name: Create Pull Request
      # 只有当上一步脚本成功运行且有新的分支名称输出时才执行
      if: success() && steps.run_script.outputs.new_branch_name != ''
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # 使用环境变量 env.PR_TITLE 来获取标题值
        title: ${{ env.PR_TITLE }}
        body: |
          This PR was automatically generated by GitHub Actions to sync rule updates from configured sources.

          Please review the changes and merge if approved.
        # 从脚本输出的环境变量中获取分支名 (注意脚本中是写入 $GITHUB_OUTPUT)
        branch: ${{ steps.run_script.outputs.new_branch_name }}
        base: main
        delete-branch: true