name: Sync Rules from Config

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync_and_create_pr:
    runs-on: ubuntu-latest

    # 添加权限配置
    permissions:
      contents: write       # 授予写入仓库内容的权限，这是 git push 所需的
      pull-requests: write  # 授予创建和管理 Pull Request 的权限 (peter-evans/create-pull-request 需要)

    env:
      PR_TITLE: "Automated Rule Sync Update"

    outputs:
      new_branch_name: ${{ steps.run_script.outputs.new_branch_name }}


    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Git identity
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install PyYAML
      run: pip install PyYAML

    - name: Run Rule Sync Script
      id: run_script
      run: python scripts/sync_rules.py
      shell: bash

    - name: Create Pull Request
      if: success() && steps.run_script.outputs.new_branch_name != ''
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        title: ${{ env.PR_TITLE }}
        body: |
          This PR was automatically generated by GitHub Actions to sync rule updates from configured sources.

          Please review the changes and merge if approved.
        branch: ${{ steps.run_script.outputs.new_branch_name }}
        base: main
        delete-branch: true