name: Sync Elastic Rules

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout RuleHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Elastic Repository
        run: |
          git clone --depth 1 https://github.com/elastic/detection-rules.git /tmp/elastic

      - name: Sync Rules
        run: |
          rm -rf rules/public/elastic/*
          cp -r /tmp/elastic/rules/* rules/public/elastic/
          rm -rf /tmp/elastic

      - name: Commit Changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add rules/public/elastic
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync Elastic rules $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git