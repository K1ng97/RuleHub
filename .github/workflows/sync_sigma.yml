name: Sync Sigma Rules

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout RuleHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Sigma Repository
        run: |
          git clone --depth 1 https://github.com/SigmaHQ/sigma.git /tmp/sigma

      - name: Sync Rules
        run: |
          rm -rf rules/public/sigma/*
          cp -r /tmp/sigma/rules/* rules/public/sigma/
          rm -rf /tmp/sigma

      - name: Commit Changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add rules/public/sigma
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync Sigma rules $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git